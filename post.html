<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投稿 ― Phobiarc</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap');
:root{
  --bg:#4A2B2B; --bg-soft:#5A3535; --bg-line:rgba(242,200,209,0.12);
  --paper:#F2C8D1; --paper-soft:#F8DEE4; --ink:#3A2020; --ink-soft:#9A5B5B;
  --seal:#8B4F4F; --seal-dark:#6E3D3D; --gold:#E8A8B5; --danger:#B34A4A;
  --font-display:'Shippori Mincho', serif; --font-body:'Zen Kaku Gothic New', sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--bg);font-family:var(--font-body);color:var(--paper);min-height:100vh;}
a{text-decoration:none;color:inherit;}
.app{display:flex;max-width:920px;margin:0 auto;min-height:100vh;align-items:flex-start;}

.sidebar{width:250px;flex-shrink:0;padding:32px 20px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:28px;border-right:1px solid var(--bg-line);}
.logo{font-family:var(--font-display);font-weight:700;font-size:28px;letter-spacing:.04em;line-height:1.2;}
.logo small{display:block;font-family:var(--font-body);font-size:11px;font-weight:400;letter-spacing:.12em;color:var(--gold);margin-top:6px;}
.nav{display:flex;flex-direction:column;gap:4px;}
.nav-btn{display:flex;align-items:center;gap:12px;background:none;border:none;color:var(--paper);font-family:var(--font-body);font-size:16px;font-weight:500;padding:12px 14px;border-radius:10px;cursor:pointer;text-align:left;transition:background .15s ease;}
.nav-btn svg{width:20px;height:20px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.8;}
.nav-btn:hover{background:var(--bg-soft);}
.account-row{display:flex;align-items:center;justify-content:space-between;font-size:12.5px;color:#E8A8B5;padding:0 4px;}
.rules-card{margin-top:auto;background:var(--bg-soft);border:1px solid var(--bg-line);border-radius:14px;padding:16px 18px;font-size:12.5px;line-height:1.8;color:#E8A8B5;}
.rules-card b{display:block;font-family:var(--font-display);font-size:14px;color:var(--gold);margin-bottom:6px;font-weight:700;}

.main{flex:1;min-width:0;border-right:1px solid var(--bg-line);}
.view-header{padding:18px 24px;border-bottom:1px solid var(--bg-line);font-family:var(--font-display);font-size:19px;font-weight:700;position:sticky;top:0;background:rgba(74,43,43,.9);backdrop-filter:blur(6px);z-index:5;display:flex;align-items:center;gap:14px;}
.back-link{font-size:13px;font-weight:500;color:#E8A8B5;font-family:var(--font-body);}
.back-link:hover{color:var(--gold);}

.feed-empty{padding:60px 24px;text-align:center;color:#B98890;font-family:var(--font-display);font-size:15px;line-height:1.9;}
.loading-note{padding:60px 24px;color:#B98890;font-family:var(--font-display);font-size:15px;}

.post-detail{padding:20px 24px;border-bottom:1px solid var(--bg-line);}
.post-detail-top{display:flex;align-items:center;gap:14px;}
.seal{
  flex-shrink:0;width:44px;height:44px;border-radius:50%;background:var(--seal);color:var(--paper);
  display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;
  font-size:18px;border:2px solid var(--seal-dark);transform:rotate(-4deg);
  box-shadow:0 0 0 2px rgba(242,200,209,0.06) inset;
}
.post-detail-name{font-weight:700;font-size:16px;color:var(--paper);}
.post-detail-handle{font-size:13.5px;color:#D8A8B0;margin-top:2px;}
.post-detail-text{margin-top:16px;font-size:19px;line-height:1.8;color:#F2C8D1;white-space:pre-wrap;word-break:break-word;}
.post-detail-time{margin-top:14px;font-size:13px;color:#D8A8B0;}
.post-actions{display:flex;gap:22px;margin-top:16px;}
.action-btn{
  display:flex;align-items:center;gap:6px;background:none;border:none;color:#D8A8B0;
  font-family:var(--font-body);font-size:13.5px;cursor:pointer;padding:4px 2px;transition:color .15s ease;
}
.action-btn svg{width:17px;height:17px;flex-shrink:0;display:block;stroke:currentColor;fill:none;stroke-width:1.8;}
.action-btn:hover{color:var(--gold);}
.action-btn.liked{color:var(--seal);}
.action-btn.liked svg{fill:var(--seal);stroke:var(--seal);}
.action-btn.delete-btn:hover{color:var(--danger);}
.parent-link{display:block;padding:10px 24px;font-size:13px;color:#D8A8B0;border-bottom:1px solid var(--bg-line);}
.parent-link:hover{color:var(--gold);}

.composer{padding:20px 24px;border-bottom:1px solid var(--bg-line);}
.composer-card{background:var(--paper);border-radius:16px;padding:18px 20px 14px;color:var(--ink);}
.composer textarea{
  width:100%;border:none;resize:none;background:transparent;font-family:var(--font-body);
  font-size:16px;line-height:1.7;color:var(--ink);min-height:60px;outline:none;
}
.composer textarea::placeholder{color:var(--ink-soft);}
.composer-foot{display:flex;align-items:center;justify-content:space-between;margin-top:6px;}
.char-count{font-size:12.5px;color:var(--ink-soft);font-variant-numeric:tabular-nums;}
.char-count.warn{color:var(--seal);}
.char-count.over{color:var(--danger);font-weight:700;}
.composer-error{font-size:13px;color:var(--danger);margin-top:8px;min-height:0;font-weight:500;}
.submit-btn{
  background:var(--seal);color:var(--paper);border:none;border-radius:999px;font-family:var(--font-body);
  font-weight:700;font-size:14px;padding:9px 22px;cursor:pointer;transition:background .15s ease, opacity .15s ease;
}
.submit-btn:hover{background:var(--seal-dark);}
.submit-btn:disabled{opacity:.4;cursor:not-allowed;}

.reply-section-title{padding:14px 24px 0;font-family:var(--font-display);font-size:14.5px;color:#E8A8B5;font-weight:700;}

.post{display:flex;gap:14px;padding:18px 24px;border-bottom:1px solid var(--bg-line);cursor:pointer;transition:background .12s ease;}
.post:hover{background:var(--bg-soft);}
.post-body{flex:1;min-width:0;}
.post-meta{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;}
.post-name{font-weight:700;font-size:15px;color:var(--paper);}
.post-handle,.post-time{font-size:13px;color:#D8A8B0;}
.post-text{margin-top:4px;font-size:15.5px;line-height:1.75;color:#F2C8D1;white-space:pre-wrap;word-break:break-word;}

::selection{background:var(--gold);color:var(--ink);}

@media (max-width: 760px){
  .app{flex-direction:column;}
  .sidebar{width:100%;height:auto;position:sticky;flex-direction:row;align-items:center;padding:14px 16px;gap:14px;border-right:none;border-bottom:1px solid var(--bg-line);}
  .logo{font-size:20px;}
  .logo small{display:none;}
  .nav{flex-direction:row;gap:2px;}
  .nav-btn span{display:none;}
  .nav-btn{padding:10px;}
  .rules-card{display:none;}
  .account-row{display:none;}
  .main{border-right:none;}
  .post-detail,.composer,.post,.reply-section-title,.parent-link{padding-left:16px;padding-right:16px;}
}
</style>
</head>
<body>

<!-- ============================================================
     ▼ index.html / profile.html / settings.html と同じ値をここにも貼り付けてください ▼
     取得場所: Supabaseダッシュボード → 左メニュー Settings → API
     ============================================================ -->
<script>
  const SUPABASE_URL = "https://sooktjzdcrptcdvsfqix.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvb2t0anpkY3JwdGNkdnNmcWl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MDA4ODQsImV4cCI6MjA5OTE3Njg4NH0.HPv50XB6q_ujzWbfI1jVpnBCv5HbCsDI46OfzyQ7jgQ";
</script>
<!-- ============================================================ -->

<div class="app" id="mainApp" style="display:none;">
  <aside class="sidebar">
    <div class="logo">Phobiarc<small>言葉だけの、居場所</small></div>
    <nav class="nav">
      <a class="nav-btn" href="index.html">
        <svg viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/></svg>
        <span>ホーム</span>
      </a>
      <a class="nav-btn" href="profile.html">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9 9.5c0-1.5 1.2-2.5 3-2.5s3 1 3 2.5-1 2-2 2.4c-.6.3-1 .7-1 1.4"/><circle cx="12" cy="16.6" r=".6" fill="currentColor" stroke="none"/></svg>
        <span>プロフィール</span>
      </a>
    </nav>
    <div class="account-row"><span id="accountHandle"></span></div>
    <div class="rules-card">
      <b>投稿ルール</b>
      写真・画像は使えません。<br>
      プロフィールも投稿も、文字だけです。<br>
      他サイトへのリンクの貼り付けも禁止です。
    </div>
  </aside>

  <main class="main">
    <div class="view-header">
      <a class="back-link" href="index.html">← 戻る</a>
      投稿
    </div>
    <div id="parentLink"></div>
    <div id="postDetail"><div class="loading-note">読み込み中…</div></div>
    <div class="composer" id="replyComposer" style="display:none;">
      <div class="composer-card">
        <textarea id="replyInput" placeholder="返信を書く（文字だけ）" maxlength="300"></textarea>
        <div class="composer-error" id="replyError"></div>
        <div class="composer-foot">
          <span class="char-count" id="replyCount">0 / 300字</span>
          <button class="submit-btn" id="replySubmit" disabled>返信する</button>
        </div>
      </div>
    </div>
    <div class="reply-section-title" id="replySectionTitle" style="display:none;">返信</div>
    <div id="replyList"></div>
  </main>
</div>

<script>
(function(){
  const LINK_PATTERN = /(https?:\/\/|www\.|[a-zA-Z0-9-]+\.(com|net|org|jp|co\.jp|io|dev|me|info|xyz|biz|tv|app|ai|gg|to|ly|link))/i;
  const MAX_LEN = 300;

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let currentUser = null;
  let currentProfile = null;
  let post = null;
  const myLikes = new Set();
  const postId = new URLSearchParams(window.location.search).get('id');

  function escapeHtml(str){
    return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function relTime(ts){
    const diff = Math.max(0, Date.now() - new Date(ts).getTime());
    const m = Math.floor(diff/60000);
    if(m < 1) return 'たった今';
    if(m < 60) return m + '分前';
    const h = Math.floor(m/60);
    if(h < 24) return h + '時間前';
    const d = Math.floor(h/24);
    if(d < 7) return d + '日前';
    return new Date(ts).toLocaleDateString('ja-JP');
  }
  function containsLink(text){ return LINK_PATTERN.test(text); }

  function renderPost(){
    const area = document.getElementById('postDetail');
    const isOwner = post.author_id === currentUser.id;
    const liked = myLikes.has(post.id);
    const likeCount = (post.likes||[]).length;

    document.getElementById('parentLink').innerHTML = post.parent_id
      ? `<a class="parent-link" href="post.html?id=${encodeURIComponent(post.parent_id)}">↑ 元の投稿を見る</a>`
      : '';

    area.innerHTML = `
      <div class="post-detail">
        <div class="post-detail-top">
          <div class="seal">${escapeHtml((post.profiles?.name||'ゲスト').trim()[0] || 'ゲ')}</div>
          <div>
            <div class="post-detail-name">${escapeHtml(post.profiles?.name||'ゲスト')}</div>
            <div class="post-detail-handle">@${escapeHtml(post.profiles?.handle||'guest')}</div>
          </div>
        </div>
        <div class="post-detail-text">${escapeHtml(post.text)}</div>
        <div class="post-detail-time">${new Date(post.created_at).toLocaleString('ja-JP')}</div>
        <div class="post-actions">
          <button class="action-btn like-btn ${liked?'liked':''}" id="likeBtn">
            <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            ${likeCount}
          </button>
          ${isOwner ? `
          <button class="action-btn delete-btn" id="deleteBtn">
            <svg viewBox="0 0 24 24"><path d="M4 7h16"/><path d="M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/><path d="M6 7l1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13"/></svg>
            削除
          </button>` : ''}
        </div>
      </div>
    `;

    document.getElementById('likeBtn').addEventListener('click', async () => {
      if(myLikes.has(post.id)){
        myLikes.delete(post.id);
        post.likes = (post.likes||[]).filter(l => l.user_id !== currentUser.id);
        await supabase.from('likes').delete().eq('post_id', post.id).eq('user_id', currentUser.id);
      } else {
        myLikes.add(post.id);
        post.likes = [...(post.likes||[]), { user_id: currentUser.id }];
        await supabase.from('likes').insert({ post_id: post.id, user_id: currentUser.id });
      }
      renderPost();
    });

    if(isOwner){
      document.getElementById('deleteBtn').addEventListener('click', async () => {
        if(!confirm('この投稿を削除しますか？この操作は取り消せません。')) return;
        const { error } = await supabase.from('posts').delete().eq('id', post.id).eq('author_id', currentUser.id);
        if(error){ alert('削除に失敗しました: ' + error.message); return; }
        window.location.href = post.parent_id ? ('post.html?id=' + encodeURIComponent(post.parent_id)) : 'index.html';
      });
    }
  }

  // ---------- 返信一覧(通常の投稿と同じカードで表示) ----------
  function replyCardHtml(r){
    const liked = myLikes.has(r.id);
    const isOwner = r.author_id === currentUser.id;
    const likeCount = (r.likes||[]).length;
    return `
    <div class="post" data-id="${r.id}">
      <div class="seal">${escapeHtml((r.profiles?.name||'ゲスト').trim()[0] || 'ゲ')}</div>
      <div class="post-body">
        <div class="post-meta">
          <span class="post-name">${escapeHtml(r.profiles?.name||'ゲスト')}</span>
          <span class="post-handle">@${escapeHtml(r.profiles?.handle||'guest')}</span>
          <span class="post-time">・${relTime(r.created_at)}</span>
        </div>
        <div class="post-text">${escapeHtml(r.text)}</div>
        <div class="post-actions">
          <button class="action-btn reply-toggle">
            <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
            ${r.replyCount||0}
          </button>
          <button class="action-btn like-btn ${liked?'liked':''}">
            <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            ${likeCount}
          </button>
          ${isOwner ? `
          <button class="action-btn delete-btn">
            <svg viewBox="0 0 24 24"><path d="M4 7h16"/><path d="M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/><path d="M6 7l1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13"/></svg>
            削除
          </button>` : ''}
        </div>
      </div>
    </div>`;
  }

  async function attachReplyCounts(posts){
    if(!posts.length) return;
    const { data } = await supabase
      .from('posts')
      .select('parent_id')
      .in('parent_id', posts.map(p => p.id));
    const counts = {};
    (data||[]).forEach(r => { counts[r.parent_id] = (counts[r.parent_id]||0) + 1; });
    posts.forEach(p => { p.replyCount = counts[p.id] || 0; });
  }

  function bindReplyEvents(container){
    container.querySelectorAll('.post').forEach(el => {
      const id = el.dataset.id;

      el.addEventListener('click', (e) => {
        if(e.target.closest('.like-btn') || e.target.closest('.delete-btn')) return;
        window.location.href = 'post.html?id=' + encodeURIComponent(id);
      });

      el.querySelector('.like-btn').addEventListener('click', async () => {
        if(myLikes.has(id)){
          myLikes.delete(id);
          await supabase.from('likes').delete().eq('post_id', id).eq('user_id', currentUser.id);
        } else {
          myLikes.add(id);
          await supabase.from('likes').insert({ post_id: id, user_id: currentUser.id });
        }
        await loadReplies();
      });

      const deleteBtn = el.querySelector('.delete-btn');
      if(deleteBtn){
        deleteBtn.addEventListener('click', async () => {
          if(!confirm('この投稿を削除しますか？この操作は取り消せません。')) return;
          const { error } = await supabase.from('posts').delete().eq('id', id).eq('author_id', currentUser.id);
          if(error){ alert('削除に失敗しました: ' + error.message); return; }
          await loadReplies();
        });
      }
    });
  }

  async function loadReplies(){
    const { data, error } = await supabase
      .from('posts')
      .select(`
        id, text, created_at, author_id,
        profiles!author_id ( name, handle ),
        likes ( user_id )
      `)
      .eq('parent_id', postId)
      .order('created_at', { ascending: true });

    const list = document.getElementById('replyList');
    if(error){
      list.innerHTML = `<div class="feed-empty">読み込みに失敗しました: ${escapeHtml(error.message)}</div>`;
      document.getElementById('replySectionTitle').style.display = 'none';
      return;
    }
    document.getElementById('replySectionTitle').style.display = data.length ? '' : 'none';
    if(!data.length){
      list.innerHTML = `<div class="feed-empty">まだ返信がありません。</div>`;
      return;
    }
    data.forEach(r => { if((r.likes||[]).some(l => l.user_id === currentUser.id)) myLikes.add(r.id); });
    await attachReplyCounts(data);

    list.innerHTML = data.map(replyCardHtml).join('');
    bindReplyEvents(list);
  }

  async function loadPost(){
    const { data, error } = await supabase
      .from('posts')
      .select(`
        id, text, created_at, author_id, parent_id,
        profiles!author_id ( name, handle ),
        likes ( user_id )
      `)
      .eq('id', postId)
      .single();

    if(error || !data){
      document.getElementById('postDetail').innerHTML = `<div class="feed-empty">投稿が見つかりませんでした。<br>削除されたか、URLが間違っている可能性があります。</div>`;
      document.getElementById('replyComposer').style.display = 'none';
      document.getElementById('replySectionTitle').style.display = 'none';
      return;
    }
    post = data;
    myLikes.clear();
    if((post.likes||[]).some(l => l.user_id === currentUser.id)) myLikes.add(post.id);
    renderPost();
    document.getElementById('replyComposer').style.display = '';
    await loadReplies();
  }

  // ---------- 返信フォーム ----------
  const replyInput = document.getElementById('replyInput');
  const replyCount = document.getElementById('replyCount');
  const replyError = document.getElementById('replyError');
  const replySubmit = document.getElementById('replySubmit');

  replyInput.addEventListener('input', () => {
    const len = replyInput.value.length;
    replyCount.textContent = `${len} / ${MAX_LEN}字`;
    replyCount.className = 'char-count' + (len > MAX_LEN ? ' over' : len > MAX_LEN*0.9 ? ' warn' : '');
    replyError.textContent = '';
    replySubmit.disabled = !(len > 0 && len <= MAX_LEN);
  });

  replySubmit.addEventListener('click', async () => {
    const text = replyInput.value.trim();
    if(!text){ replyError.textContent = '本文を入力してください。'; return; }
    if(containsLink(text)){ replyError.textContent = 'リンクは投稿できません。'; return; }
    const { error } = await supabase.from('posts').insert({ parent_id: postId, author_id: currentUser.id, text });
    if(error){ replyError.textContent = '送信に失敗しました: ' + error.message; return; }
    replyInput.value = '';
    replyCount.textContent = `0 / ${MAX_LEN}字`;
    replyCount.className = 'char-count';
    replySubmit.disabled = true;
    await loadReplies();
  });

  // ---------- 初期化 ----------
  (async function init(){
    if(!postId){
      window.location.href = 'index.html';
      return;
    }
    const { data: { session } } = await supabase.auth.getSession();
    if(!session){
      window.location.href = 'index.html';
      return;
    }
    const { data: { user } } = await supabase.auth.getUser();
    currentUser = user;
    const { data: profileRow } = await supabase.from('profiles').select('*').eq('id', user.id).single();
    currentProfile = profileRow;
    document.getElementById('accountHandle').textContent = '@' + currentProfile.handle;

    document.getElementById('mainApp').style.display = '';
    await loadPost();
  })();
})();
</script>
</body>
</html>
