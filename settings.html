<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アカウント設定 ― Phobiarc</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap');
:root{
  --bg:#47432F; --bg-soft:#55503A; --bg-line:rgba(234,217,200,0.12);
  --paper:#E4E1D3; --paper-soft:#EAD9C8; --ink:#3A3626; --ink-soft:#9B7268;
  --seal:#7C5449; --seal-dark:#5F3F36; --gold:#B7BFA8; --danger:#B2604A;
  --font-display:'Shippori Mincho', serif; --font-body:'Zen Kaku Gothic New', sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--bg);font-family:var(--font-body);color:var(--paper);min-height:100vh;}
a{text-decoration:none;color:inherit;}
.app{display:flex;max-width:920px;margin:0 auto;min-height:100vh;align-items:flex-start;}

.sidebar{width:250px;flex-shrink:0;padding:32px 20px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:28px;border-right:1px solid var(--bg-line);}
.logo{font-family:var(--font-display);font-weight:700;font-size:28px;letter-spacing:.04em;line-height:1.2;}
.logo small{display:block;font-family:var(--font-body);font-size:11px;font-weight:400;letter-spacing:.12em;color:var(--gold);margin-top:6px;}
.nav{display:flex;flex-direction:column;gap:4px;}
.nav-btn{display:flex;align-items:center;gap:12px;background:none;border:none;color:var(--paper);font-family:var(--font-body);font-size:16px;font-weight:500;padding:12px 14px;border-radius:10px;cursor:pointer;text-align:left;transition:background .15s ease;}
.nav-btn svg{width:20px;height:20px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.8;}
.nav-btn:hover{background:var(--bg-soft);}
.nav-btn.active{background:var(--bg-soft);color:var(--gold);}
.account-row{display:flex;align-items:center;justify-content:space-between;font-size:12.5px;color:#C9C2AE;padding:0 4px;}
.rules-card{margin-top:auto;background:var(--bg-soft);border:1px solid var(--bg-line);border-radius:14px;padding:16px 18px;font-size:12.5px;line-height:1.8;color:#C9C2AE;}
.rules-card b{display:block;font-family:var(--font-display);font-size:14px;color:var(--gold);margin-bottom:6px;font-weight:700;}

.main{flex:1;min-width:0;border-right:1px solid var(--bg-line);}
.view-header{padding:18px 24px;border-bottom:1px solid var(--bg-line);font-family:var(--font-display);font-size:19px;font-weight:700;position:sticky;top:0;background:rgba(71,67,47,.9);backdrop-filter:blur(6px);z-index:5;display:flex;align-items:center;gap:14px;}
.back-link{font-size:13px;font-weight:500;color:#C9C2AE;font-family:var(--font-body);}
.back-link:hover{color:var(--gold);}

.profile-card{margin:20px 24px;background:var(--paper);color:var(--ink);border-radius:16px;padding:22px 24px;}
.profile-card .seal{width:56px;height:56px;font-size:22px;margin-bottom:12px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12.5px;font-weight:700;color:var(--ink-soft);margin-bottom:5px;letter-spacing:.04em;}
.field input, .field textarea{width:100%;border:1px solid rgba(58,54,38,.18);border-radius:8px;padding:9px 11px;font-family:var(--font-body);font-size:14.5px;color:var(--ink);background:var(--paper-soft);outline:none;}
.field textarea{resize:none;min-height:60px;}
.field-hint{font-size:11.5px;color:var(--ink-soft);margin-top:4px;line-height:1.5;}
.save-row{display:flex;align-items:center;gap:12px;margin-top:6px;}
.save-note{font-size:12.5px;color:var(--ink-soft);}
.composer-error{font-size:13px;color:var(--danger);margin-top:8px;min-height:0;font-weight:500;}
.submit-btn{background:var(--seal);color:var(--paper);border:none;border-radius:999px;font-family:var(--font-body);font-weight:700;font-size:14px;padding:9px 22px;cursor:pointer;transition:background .15s ease, opacity .15s ease;}
.submit-btn:hover{background:var(--seal-dark);}
.submit-btn:disabled{opacity:.4;cursor:not-allowed;}

.account-card{margin:0 24px 20px;background:var(--bg-soft);border:1px solid var(--bg-line);border-radius:16px;padding:18px 22px;}
.account-card h3{font-family:var(--font-display);font-size:15px;margin:0 0 6px;color:var(--gold);font-weight:700;}
.account-card p{font-size:12.5px;color:#C9C2AE;line-height:1.7;margin:0 0 14px;}
.danger-btn{background:transparent;border:1px solid var(--danger);color:#D9BEB0;border-radius:999px;font-family:var(--font-body);font-weight:700;font-size:13.5px;padding:8px 18px;cursor:pointer;transition:background .15s ease;}
.danger-btn:hover{background:rgba(178,96,74,.15);}
.loading-note{padding:60px 24px;color:#8C8574;font-family:var(--font-display);font-size:15px;}

::selection{background:var(--gold);color:var(--ink);}

@media (max-width: 760px){
  .app{flex-direction:column;}
  .sidebar{width:100%;height:auto;position:sticky;flex-direction:row;align-items:center;padding:14px 16px;gap:14px;border-right:none;border-bottom:1px solid var(--bg-line);}
  .logo{font-size:20px;}
  .logo small{display:none;}
  .nav{flex-direction:row;gap:2px;}
  .nav-btn span{display:none;}
  .nav-btn{padding:10px;}
  .rules-card{display:none;}
  .account-row{display:none;}
  .main{border-right:none;}
  .profile-card,.account-card{margin-left:16px;margin-right:16px;}
}
</style>
</head>
<body>

<!-- ============================================================
     ▼ index.html / profile.html と同じ値をここにも貼り付けてください ▼
     取得場所: Supabaseダッシュボード → 左メニュー Settings → API
     ============================================================ -->
<script>
  const SUPABASE_URL = "https://sooktjzdcrptcdvsfqix.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvb2t0anpkY3JwdGNkdnNmcWl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MDA4ODQsImV4cCI6MjA5OTE3Njg4NH0.HPv50XB6q_ujzWbfI1jVpnBCv5HbCsDI46OfzyQ7jgQ";
</script>
<!-- ============================================================ -->

<div class="app" id="mainApp" style="display:none;">
  <aside class="sidebar">
    <div class="logo">Phobiarc<small>言葉だけの、居場所</small></div>
    <nav class="nav">
      <a class="nav-btn" href="index.html">
        <svg viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/></svg>
        <span>ホーム</span>
      </a>
      <a class="nav-btn" href="profile.html">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9 9.5c0-1.5 1.2-2.5 3-2.5s3 1 3 2.5-1 2-2 2.4c-.6.3-1 .7-1 1.4"/><circle cx="12" cy="16.6" r=".6" fill="currentColor" stroke="none"/></svg>
        <span>プロフィール</span>
      </a>
    </nav>
    <div class="account-row"><span id="accountHandle"></span></div>
    <div class="rules-card">
      <b>投稿ルール</b>
      写真・画像は使えません。<br>
      プロフィールも投稿も、文字だけです。<br>
      他サイトへのリンクの貼り付けも禁止です。
    </div>
  </aside>

  <main class="main">
    <div class="view-header">
      <a class="back-link" href="profile.html">← プロフィールに戻る</a>
      アカウント設定
    </div>

    <div class="profile-card">
      <div class="seal" id="profileSealPreview">ゲ</div>
      <div class="field">
        <label>ユーザーID（半角英数字とアンダースコア、3〜15文字）</label>
        <input type="text" id="profileHandle" maxlength="15" placeholder="ユーザーIDを入力">
        <div class="field-hint">@から始まる形で投稿に表示されます。他の人が使っているIDには変更できません。</div>
      </div>
      <div class="field">
        <label>名前</label>
        <input type="text" id="profileName" maxlength="20" placeholder="名前を入力">
      </div>
      <div class="field">
        <label>ひとこと紹介（写真は使えません・文字のみ）</label>
        <textarea id="profileBio" maxlength="120" placeholder="自己紹介を文字だけで書いてください"></textarea>
      </div>
      <div class="composer-error" id="profileError"></div>
      <div class="save-row">
        <button class="submit-btn" id="profileSave">保存する</button>
        <span class="save-note" id="profileSavedNote"></span>
      </div>
    </div>

    <div class="account-card">
      <h3>アカウント</h3>
      <p>ログアウトすると、このデバイスのログイン状態が解除されます。</p>
      <button class="danger-btn" id="logoutBtn">ログアウトする</button>
    </div>
  </main>
</div>

<script>
(function(){
  const LINK_PATTERN = /(https?:\/\/|www\.|[a-zA-Z0-9-]+\.(com|net|org|jp|co\.jp|io|dev|me|info|xyz|biz|tv|app|ai|gg|to|ly|link))/i;
  const HANDLE_PATTERN = /^[a-zA-Z0-9_]{3,15}$/;

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let currentUser = null;
  let currentProfile = null;

  function containsLink(text){ return LINK_PATTERN.test(text); }

  function renderProfileForm(){
    document.getElementById('profileName').value = currentProfile.name || '';
    document.getElementById('profileBio').value = currentProfile.bio || '';
    document.getElementById('profileHandle').value = currentProfile.handle || '';
    document.getElementById('profileSealPreview').textContent = (currentProfile.name||'ゲ').trim()[0] || 'ゲ';
    document.getElementById('accountHandle').textContent = '@' + currentProfile.handle;
  }

  document.getElementById('profileSave').addEventListener('click', async () => {
    const name = document.getElementById('profileName').value.trim();
    const bio = document.getElementById('profileBio').value.trim();
    const handle = document.getElementById('profileHandle').value.trim().toLowerCase();
    const err = document.getElementById('profileError');
    if(!name){ err.textContent = '名前を入力してください。'; return; }
    if(!HANDLE_PATTERN.test(handle)){ err.textContent = 'ユーザーIDは半角英数字とアンダースコアで3〜15文字にしてください。'; return; }
    if(containsLink(bio) || containsLink(name)){ err.textContent = 'プロフィールにリンクは使えません。'; return; }
    err.textContent = '';

    const { error } = await supabase.from('profiles').update({ name, bio, handle }).eq('id', currentUser.id);
    if(error){
      if(error.code === '23505' || error.message.includes('duplicate')){
        err.textContent = 'このユーザーIDはすでに使われています。別のIDを試してください。';
      } else {
        err.textContent = '保存に失敗しました: ' + error.message;
      }
      return;
    }

    currentProfile.name = name;
    currentProfile.bio = bio;
    currentProfile.handle = handle;
    renderProfileForm();
    const note = document.getElementById('profileSavedNote');
    note.textContent = '保存しました';
    setTimeout(()=>{ note.textContent=''; }, 2000);
  });

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await supabase.auth.signOut();
    window.location.href = 'index.html';
  });

  (async function init(){
    const { data: { session } } = await supabase.auth.getSession();
    if(!session){
      window.location.href = 'index.html';
      return;
    }
    const { data: { user } } = await supabase.auth.getUser();
    currentUser = user;
    const { data: profileRow } = await supabase.from('profiles').select('*').eq('id', user.id).single();
    currentProfile = profileRow;

    document.getElementById('mainApp').style.display = '';
    renderProfileForm();
  })();
})();
</script>
</body>
</html>
